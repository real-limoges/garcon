name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (GHC 9.12.2)
    runs-on: ubuntu-latest
    container: haskell:9.12.2

    steps:
      - name: Checkout garcon
        uses: actions/checkout@v4
        with:
          path: garcon

      - name: Checkout chompsky
        uses: actions/checkout@v4
        with:
          repository: real-limoges/chompsky
          path: chompsky

      - name: Checkout hazy
        uses: actions/checkout@v4
        with:
          repository: real-limoges/hazy
          path: hazy

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            /github/home/.local/state/cabal
            /github/home/.cache/cabal/packages
          key: ${{ runner.os }}-ghc-9.12.2-store-${{ hashFiles('garcon/garcon.cabal', 'chompsky/chompsky.cabal', 'hazy/hazy.cabal', 'garcon/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.12.2-store-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: garcon/dist-newstyle
          key: ${{ runner.os }}-ghc-9.12.2-dist-${{ hashFiles('garcon/garcon.cabal', 'chompsky/chompsky.cabal', 'hazy/hazy.cabal', 'garcon/src/**/*.hs', 'garcon/test/**/*.hs') }}

      - name: Update cabal index
        run: cabal update

      - name: Build
        working-directory: garcon
        run: cabal build all --enable-optimization=2

      - name: Test
        working-directory: garcon
        run: cabal test --test-show-details=direct