name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout garcon
        uses: actions/checkout@v4
        with:
          path: garcon

      - name: Checkout chompsky
        uses: actions/checkout@v4
        with:
          repository: reallimoges/chompsky
          path: chompsky

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.12.2"
          cabal-version: "latest"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ hashFiles('garcon/garcon.cabal', 'chompsky/chompsky.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Build dependencies
        working-directory: garcon
        run: cabal update && cabal build --only-dependencies

      - name: Build
        working-directory: garcon
        run: cabal build all